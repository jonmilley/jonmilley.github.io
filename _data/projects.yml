- name: gofakesmtp
  description: A fake SMTP server with a terminal UI for testing email in local development. Point your app at localhost:2525 and watch emails appear in real time — no mail server, no credentials, nothing sent.
  url: https://github.com/jonmilley/gofakesmtp
  tech: [Go]

- name: today-tui
  description: A terminal dashboard that puts everything you need to start your day in one place — GitHub issues, weather, and stock prices in a split-pane TUI.
  url: https://github.com/jonmilley/today-tui
  tech: [Go]

- name: today-mobile
  description: Flutter mobile companion to the today-tui dashboard, bringing the same at-a-glance daily overview to iOS and Android.
  url: https://github.com/jonmilley/today-mobile
  tech: [Flutter, Dart]

